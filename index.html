function verificarPass(){
if(document.getElementById("passInput").value.toUpperCase()==CLAVE_ACCESO){
document.getElementById("sec-pass").style.display="none";
document.getElementById("sec-form").classList.remove("hidden");
}else alert("Error");
}

function actualizarUnidades(){
let r=document.getElementById("ruta").value;
let u=document.getElementById("unidad");
u.innerHTML="";
if(unidadesData[r]){
unidadesData[r].forEach(x=>{
let o=document.createElement("option");
o.value=x;
o.textContent=x;
u.appendChild(o);
});
}
}

async function enviarDatos(){
let r=ruta.value,u=unidad.value,k=km.value,m=manto.value,c=comentarios.value;
let f=foto.files[0];

let base64="",nombre="",tipo="";
if(f){
let reader=new FileReader();
await new Promise(res=>{
reader.onload=()=>{base64=reader.result.split(",")[1];res();}
reader.readAsDataURL(f);
});
nombre=f.name; tipo=f.type;
}

await fetch(URL_WEBAPP,{method:"POST",mode:"no-cors",
body:JSON.stringify({ruta:r,unidad:u,km:k,manto:m,comentarios:c,imagen:base64,nombre:nombre,tipo:tipo})
});

alert("GUARDADO");
}
