        h2 { color: #1a73e8; text-align: center; margin-bottom: 20px; text-transform: uppercase; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; color: #444; }
        select, input, textarea { width: 100%; padding: 15px; margin-bottom: 10px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; -webkit-appearance: none; }
        select:focus, input:focus, textarea:focus { border-color: #1a73e8; }
        textarea { height: 80px; resize: none; font-family: inherit; }
        .btn-principal { width: 100%; padding: 18px; background-color: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.2s; margin-top: 10px; -webkit-tap-highlight-color: transparent; }

        .btn-principal:disabled { background-color: #ccc; }
        .hidden { display: none !important; }
        .status-msg { text-align: center; margin-top: 10px; font-weight: bold; color: #1a73e8; }
    </style>
</head>

<div class="container">
    <h2>SISTEMA EGO</h2>

    <div id="sec-pass">
        <label>Contraseña de Acceso:</label>
        <input type="text" id="passInput" placeholder="Escribe aquí..." autocomplete="off" style="-webkit-text-security: disc;">

    </div>

        <label>1. Seleccione la Ruta:</label>
        <select id="ruta" onchange="actualizarUnidades()">

            <option value="RUTA 228">RUTA 228</option>
            <option value="RUTA 23">RUTA 23</option>
            <option value="RUTA 310">RUTA 310</option>
            <option value="RUTA 311">RUTA 311</option>
            <option value="RUTA 313">RUTA 313</option>
            <option value="RUTA 37">RUTA 37</option>
            <option value="RUTA 39">RUTA 39</option>

            <option value="RUTA 6 SANTA CATARINA">RUTA 6 SANTA CATARINA</option>
            <option value="RUTA 601">RUTA 601</option>
            <option value="RUTA 68">RUTA 68</option>
            <option value="TRANSMETRO">TRANSMETRO</option>
            <option value="VALLE SOLEADO">VALLE SOLEADO</option>
            <option value="VISTAS DEL CARMEN">VISTAS DEL CARMEN</option>
            <option value="ZUAZUA">ZUAZUA</option>
        </select>

        <label>2. Seleccione la Unidad:</label>
        <select id="unidad">
            <option value="">-- Elija ruta primero --</option>
        </select>

        <label>3. Kilometraje Actual:</label>
        <input type="number" id="km" placeholder="Ej: 150000" inputmode="numeric">

        <label>4. Tipo de Mantenimiento:</label>
        <select id="manto">
            <option value="N/A">N/A (Solo Kilometraje)</option>
            <option value="M1">M1</option>
            <option value="M2">M2</option>
            <option value="M3">M3</option>
        </select>

        <label>5. Comentarios / Reporte:</label>
        <textarea id="comentarios" placeholder="Detalles mecánicos o estéticos..."></textarea>

        <button id="btnRegistrar" class="btn-principal" onclick="enviarDatos()">REGISTRAR DATOS</button>
        <div id="status" class="status-msg"></div>
    </div>
</div>
