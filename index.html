<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E.G.O - Sistema de Flota</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { max-width: 400px; width: 100%; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 20px; text-transform: uppercase; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; color: #444; }
        select, input, textarea { width: 100%; padding: 15px; margin-bottom: 10px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        select:focus, input:focus { border-color: #1a73e8; }
        .btn-principal { width: 100%; padding: 18px; background-color: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; margin-top: 10px; }
        .btn-principal:active { background-color: #0d47a1; transform: scale(0.98); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>SISTEMA EGO</h2>

    <div id="sec-pass">
        <label>Contraseña de Acceso:</label>
        <input type="password" id="passInput" placeholder="Clave EGO">
        <button class="btn-principal" onclick="verificarPass()">INGRESAR</button>
    </div>

    <div id="sec-form" class="hidden">
        <label>1. Seleccione la Ruta:</label>
        <select id="ruta" onchange="actualizarUnidades()">
            <option value="">-- Seleccionar Ruta --</option>
            <option value="ALIANZA REAL">ALIANZA REAL</option>
            <option value="CIENEGA DE FLORES">CIENEGA DE FLORES</option>
            <option value="GARCIA">GARCIA</option>
            <option value="JARAL">JARAL</option>
            <option value="PALMIRAS">PALMIRAS</option>
            <option value="RUTA 20">RUTA 20</option>
            <option value="RUTA 109">RUTA 109</option>
            <option value="RUTA 117">RUTA 117</option>
            <option value="RUTA 206">RUTA 206</option>
            <option value="RUTA 218">RUTA 218</option>
            <option value="RUTA 218-AEROPUERTO">RUTA 218-AEROPUERTO</option>
            <option value="RUTA 218-PROVIVIENDA">RUTA 218-PROVIVIENDA</option>
            <option value="RUTA 223">RUTA 223</option>
            <option value="RUTA 228">RUTA 228</option>
            <option value="RUTA 23">RUTA 23</option>
            <option value="RUTA 310">RUTA 310</option>
            <option value="RUTA 311">RUTA 311</option>
            <option value="RUTA 313">RUTA 313</option>
            <option value="RUTA 37">RUTA 37</option>
            <option value="RUTA 39">RUTA 39</option>
            <option value="RUTA 41">RUTA 41</option>
            <option value="RUTA 527">RUTA 527</option>
            <option value="RUTA 6 SANTA CATARINA">RUTA 6 SANTA CATARINA</option>
            <option value="RUTA 601">RUTA 601</option>
            <option value="RUTA 68">RUTA 68</option>
            <option value="TRANSMETRO">TRANSMETRO</option>
            <option value="VALLE SOLEADO">VALLE SOLEADO</option>
            <option value="VISTAS DEL CARMEN">VISTAS DEL CARMEN</option>
            <option value="ZUAZUA">ZUAZUA</option>
        </select>

        <label>2. Seleccione la Unidad:</label>
        <select id="unidad">
            <option value="">-- Elija primero la ruta --</option>
        </select>

        <label>3. Kilometraje Actual:</label>
        <input type="number" id="km" placeholder="000000" inputmode="numeric">

        <label>4. Tipo de Mantenimiento:</label>
        <select id="manto">
            <option value="N/A">N/A (Solo Kilometraje)</option>
            <option value="M1">M1</option>
            <option value="M2">M2</option>
            <option value="M3">M3</option>
            <option value="M4">M4</option>
        </select>

        <label>5. Comentarios:</label>
        <textarea id="comentarios" placeholder="Reporte de fallas o detalles..."></textarea>

        <button id="btnRegistrar" class="btn-principal" onclick="enviarDatos()">REGISTRAR DATOS</button>
    </div>
</div>

<script>
    const CLAVE_ACCESO = "EGO";
    const URL_WEBAPP = "https://script.google.com/macros/s/AKfycbwOT2VempP1kvU2ej-9CMdW8s_qy3BRsSUHEKHfpiIC43EfTpUB4iy1gjph-M3hMs2cUQ/exec";

    const unidadesData = {
        "ALIANZA REAL": ["6003", "6013", "6015", "6026", "6027", "6028", "6036", "6038", "6039", "6044", "6045", "6047", "6050", "6053", "6059", "6065", "6066", "6075", "6081", "6082", "6092", "6096", "6098", "6099", "6100"],
        "CIENEGA DE FLORES": ["3386", "3409", "3415", "3425", "3427", "3431", "3433", "3450", "3459", "3466", "3544", "3565", "3579", "3584", "3585"],
        "GARCIA": ["3001", "3002", "3003", "3004", "3005", "3251", "3303", "3325", "3476", "3522"],
        "JARAL": ["3007", "3008", "3009", "3010", "3327", "3452", "3491", "3512", "3533"],
        "PALMIRAS": ["6048", "6055", "6076", "6079", "6093"],
        "RUTA 20": ["6004", "6012", "6016", "6017", "6018", "6020", "6032", "6034", "6035", "6046", "6049", "6051", "6057", "6061", "6071", "6072", "6073", "6084", "6090", "6091"],
        "RUTA 109": ["3201", "3202", "3203", "3204", "3205", "3207", "3208", "3209", "3213", "3217", "3218", "3219", "3220", "3222", "3225", "3226", "3229", "3230", "3231", "3232", "3234", "3235", "3238", "3239", "3241", "3243", "3245", "3246", "3248", "3249", "3252"],
        "RUTA 117": ["3163", "3164", "3165", "3166", "3167", "3168", "3169", "3170", "3171", "3172", "3173", "3174", "3175", "3177", "3178", "3179", "3180", "3181", "3182", "3183", "3184", "3185", "3186", "3187", "3188", "3189", "3190", "3191", "3192"],
        "RUTA 218-PROVIVIENDA": ["6005", "6008", "6009", "6011", "6014", "6019", "6022", "6029", "6030", "6031", "6033", "6037", "6040", "6041", "6042", "6052", "6056", "6058", "6062", "6063", "6064", "6067", "6069"],
        "TRANSMETRO": ["3006", "3263", "3289", "3302", "3314", "3326", "3390", "3399", "3437", "3441", "3448", "3455", "3474", "3478", "3479", "3480", "3487", "3495", "3496", "3505", "3506", "3507", "3520", "3529", "3530", "3532", "3534", "3535", "3536", "3537", "3538", "3539", "3540", "3541", "3542", "3543", "3547", "3563", "3568", "3574", "3580", "3583", "3587", "3598"],
        "VISTAS DEL CARMEN": ["6001", "6002", "6006", "6007", "6010", "6021", "6023", "6024", "6025", "6054", "6060", "6077", "6080", "6088", "6094"]
    };

    function verificarPass() {
        const pass = document.getElementById('passInput').value.trim().toUpperCase();
        if(pass === CLAVE_ACCESO) {
            document.getElementById('sec-pass').style.display = 'none';
            document.getElementById('sec-form').classList.remove('hidden');
        } else {
            alert("Contraseña Incorrecta");
        }
    }

    function actualizarUnidades() {
        const r = document.getElementById('ruta').value;
        const u = document.getElementById('unidad');
        u.innerHTML = '<option value="">-- Seleccionar --</option>';
        if (r && unidadesData[r]) {
            unidadesData[r].forEach(num => {
                const opt = document.createElement('option');
                opt.value = num;
                opt.textContent = "Unidad " + num;
                u.appendChild(opt);
            });
        }
    }

    async function enviarDatos() {
        const r = document.getElementById('ruta').value;
        const u = document.getElementById('unidad').value;
        const k = document.getElementById('km').value;
        const m = document.getElementById('manto').value;
        const c = document.getElementById('comentarios').value;

        if(!r || !u || !k) return alert("Por favor selecciona Ruta, Unidad y Kilometraje");

        const btn = document.getElementById('btnRegistrar');
        btn.disabled = true;
        btn.innerText = "REGISTRANDO...";

        const urlFinal = `${URL_WEBAPP}?ruta=${encodeURIComponent(r)}&unidad=${encodeURIComponent(u)}&km=${encodeURIComponent(k)}&manto=${encodeURIComponent(m)}&comentarios=${encodeURIComponent(c)}`;

        try {
            await fetch(urlFinal, { mode: 'no-cors' });
            alert("✅ GUARDADO EN EXCEL CORRECTAMENTE");
            document.getElementById('km').value = "";
            document.getElementById('comentarios').value = "";
        } catch (e) {
            alert("Error de red");
        } finally {
            btn.disabled = false;
            btn.innerText = "REGISTRAR DATOS";
        }
    }
</script>

</body>
</html>
