<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E.G.O - Registro de Flota</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; padding: 20px; }
        .container { max-width: 400px; width: 100%; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; text-align: center; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        select, input, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        .btn-principal { width: 100%; padding: 15px; background-color: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 20px; }
        .btn-principal:active { background-color: #0d47a1; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>SISTEMA EGO</h2>

    <div id="sec-pass">
        <label>Contraseña de Acceso:</label>
        <input type="password" id="passInput" placeholder="Ingrese clave">
        <button class="btn-principal" onclick="verificarPass()">INGRESAR</button>
    </div>

    <div id="sec-form" class="hidden">
        <label>Ruta:</label>
        <select id="ruta" onchange="actualizarUnidades()">
            <option value="">-- Seleccionar --</option>
            <option value="ALIANZA REAL">ALIANZA REAL</option>
            <option value="CIENEGA DE FLORES">CIENEGA DE FLORES</option>
            <option value="GARCIA">GARCIA</option>
            <option value="JARAL">JARAL</option>
            <option value="PALMIRAS">PALMIRAS</option>
            <option value="RUTA 20">RUTA 20</option>
            <option value="RUTA 109">RUTA 109</option>
            <option value="RUTA 117">RUTA 117</option>
            <option value="RUTA 206">RUTA 206</option>
            <option value="RUTA 218">RUTA 218</option>
            <option value="RUTA 223">RUTA 223</option>
            <option value="RUTA 228">RUTA 228</option>
            <option value="RUTA 23">RUTA 23</option>
            <option value="RUTA 310">RUTA 310</option>
            <option value="RUTA 311">RUTA 311</option>
            <option value="RUTA 313">RUTA 313</option>
            <option value="RUTA 41">RUTA 41</option>
            <option value="RUTA 527">RUTA 527</option>
            <option value="TRANSMETRO">TRANSMETRO</option>
            <option value="VISTAS DEL CARMEN">VISTAS DEL CARMEN</option>
        </select>

        <label>Unidad:</label>
        <select id="unidad">
            <option value="">-- Seleccione Ruta --</option>
        </select>

        <label>Kilometraje Actual:</label>
        <input type="number" id="km" placeholder="000000">

        <label>Mantenimiento:</label>
        <select id="manto">
            <option value="N/A">Solo Kilometraje</option>
            <option value="M1">M1</option>
            <option value="M2">M2</option>
            <option value="M3">M3</option>
        </select>

        <label>Comentarios:</label>
        <textarea id="comentarios" rows="3"></textarea>

        <button id="btnRegistrar" class="btn-principal" onclick="enviarDatos()">REGISTRAR DATOS</button>
    </div>
</div>

<script>
    const CLAVE_ACCESO = "EGO";
    const URL_WEBAPP = "https://script.google.com/macros/s/AKfycbxUDhnNlg9Gm26VITmdiLBkYcRuSaumWklPXXwuoG03QI5f2qWr0IKe_LB-CAScfRvn4g/exec";

    const unidadesData = {
        "ALIANZA REAL": ["6003", "6013", "6015", "6026", "6027", "6028"],
        "CIENEGA DE FLORES": ["3386", "3409", "3415", "3425"],
        "GARCIA": ["3001", "3002", "3003", "3004"],
        "JARAL": ["3007", "3008", "3009", "3010"],
        "PALMIRAS": ["6048", "6055", "6076"],
        "RUTA 20": ["6004", "6012", "6016"],
        "RUTA 109": ["3201", "3202", "3203", "3204"],
        "RUTA 117": ["3163", "3164", "3165"],
        "RUTA 206": ["3397", "3417", "3418"],
        "RUTA 218": ["3331", "3333", "3334"],
        "RUTA 223": ["3206", "3210", "3211"],
        "RUTA 228": ["3019", "3021", "3022"],
        "RUTA 23": ["3194", "3240", "3304"],
        "RUTA 310": ["3011", "3012", "3013"],
        "RUTA 311": ["3309", "3310", "3312"],
        "RUTA 313": ["3499", "3502", "3510"],
        "RUTA 41": ["3196", "3212", "3224"],
        "RUTA 527": ["3063", "3064", "3065"],
        "TRANSMETRO": ["3006", "3263", "3289"],
        "VISTAS DEL CARMEN": ["6001", "6002", "6006"]
    };

    function verificarPass() {
        if(document.getElementById('passInput').value.toUpperCase() === CLAVE_ACCESO) {
            document.getElementById('sec-pass').classList.add('hidden');
            document.getElementById('sec-form').classList.remove('hidden');
        } else {
            alert("Clave incorrecta");
        }
    }

    function actualizarUnidades() {
        const r = document.getElementById('ruta').value;
        const u = document.getElementById('unidad');
        u.innerHTML = '<option value="">-- Seleccionar --</option>';
        if (unidadesData[r]) {
            unidadesData[r].forEach(n => {
                let opt = document.createElement('option');
                opt.value = n; opt.textContent = "Unidad " + n;
                u.appendChild(opt);
            });
        }
    }

    function enviarDatos() {
        const payload = {
            ruta: document.getElementById('ruta').value,
            unidad: document.getElementById('unidad').value,
            km: document.getElementById('km').value,
            manto: document.getElementById('manto').value,
            comentarios: document.getElementById('comentarios').value
        };

        if(!payload.ruta || !payload.unidad || !payload.km) {
            return alert("Por favor llena los campos obligatorios");
        }

        fetch(URL_WEBAPP, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(payload)
        }).then(() => {
            alert("✅ REGISTRO EXITOSO");
            location.reload();
        }).catch(e => alert("Error: " + e));
    }
</script>
</body>
</html>
