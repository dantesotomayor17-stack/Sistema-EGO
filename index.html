<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E.G.O - Sistema de Flota</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { max-width: 400px; width: 100%; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 20px; text-transform: uppercase; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; color: #444; }
        select, input, textarea { width: 100%; padding: 15px; margin-bottom: 10px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; -webkit-appearance: none; }
        input[type="file"] { padding: 10px; background: #fafafa; border: 1px dashed #1a73e8; }
        select:focus, input:focus, textarea:focus { border-color: #1a73e8; }
        textarea { height: 80px; resize: none; font-family: inherit; }
        .btn-principal { width: 100%; padding: 18px; background-color: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.2s; margin-top: 10px; -webkit-tap-highlight-color: transparent; }
        .btn-principal:active { background-color: #0d47a1; transform: scale(0.95); }
        .btn-principal:disabled { background-color: #ccc; }
        .hidden { display: none !important; }
        .preview { font-size: 12px; color: #666; font-style: italic; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h2>SISTEMA EGO</h2>

    <div id="sec-pass">
        <label>Contraseña de Acceso:</label>
        <input type="text" id="passInput" placeholder="Escribe aquí..." autocomplete="off" style="-webkit-text-security: disc;">
        <button class="btn-principal" onclick="verificarPass()">INGRESAR</button>
    </div>

    <div id="sec-form" class="hidden">
        <label>1. Seleccione la Ruta:</label>
        <select id="ruta" onchange="actualizarUnidades()">
            <option value="">-- Seleccionar --</option>
            <option value="ALIANZA REAL">ALIANZA REAL</option>
            <option value="RUTA 20">RUTA 20</option>
            <option value="RUTA 206">RUTA 206</option>
            <option value="RUTA 218">RUTA 218</option>
            <option value="RUTA 527">RUTA 527</option>
            <option value="ZUAZUA">ZUAZUA</option>
            </select>

        <label>2. Seleccione la Unidad:</label>
        <select id="unidad">
            <option value="">-- Elija ruta --</option>
        </select>

        <label>3. Kilometraje Actual:</label>
        <input type="number" id="km" placeholder="Ej: 150000" inputmode="numeric">

        <label>4. Tipo de Mantenimiento:</label>
        <select id="manto">
            <option value="N/A">N/A (Solo Kilometraje)</option>
            <option value="M1">M1</option>
            <option value="M2">M2</option>
            <option value="M3">M3</option>
            <option value="M4">M4</option>
        </select>

        <label>5. Foto de la Unidad:</label>
        <input type="file" id="fotoUnidad" accept="image/*" capture="environment">
        
        <label>6. Foto del Odómetro:</label>
        <input type="file" id="fotoOdo" accept="image/*" capture="environment">

        <label>7. Foto INE Operador:</label>
        <input type="file" id="fotoIne" accept="image/*" capture="environment">

        <label>8. Comentarios / Reporte:</label>
        <textarea id="comentarios" placeholder="Detalles de la unidad..."></textarea>

        <button id="btnRegistrar" class="btn-principal" onclick="enviarDatos()">REGISTRAR DATOS</button>
    </div>
</div>

<script>
    const CLAVE_ACCESO = "EGO";
    const URL_WEBAPP = "TU_NUEVA_URL_DE_APPS_SCRIPT"; // DEBES ACTUALIZAR ESTA URL LUEGO

    function verificarPass() {
        const input = document.getElementById('passInput');
        if(input.value.trim().toUpperCase() === CLAVE_ACCESO) {
            document.getElementById('sec-pass').style.display = 'none';
            document.getElementById('sec-form').classList.remove('hidden');
        } else {
            alert("Contraseña Incorrecta");
            input.value = "";
        }
    }

    // Función para convertir imagen a texto (Base64)
    const toBase64 = file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = error => reject(error);
    });

    async function enviarDatos() {
        const r = document.getElementById('ruta').value;
        const u = document.getElementById('unidad').value;
        const k = document.getElementById('km').value;
        const m = document.getElementById('manto').value;
        const c = document.getElementById('comentarios').value.trim();
        
        const fUnidad = document.getElementById('fotoUnidad').files[0];
        const fOdo = document.getElementById('fotoOdo').files[0];
        const fIne = document.getElementById('fotoIne').files[0];

        if(!r || !u || !k || !fUnidad || !fOdo || !fIne) {
            return alert("Por favor, llena los datos y sube las 3 fotos obligatorias.");
        }

        const btn = document.getElementById('btnRegistrar');
        btn.disabled = true;
        btn.innerText = "PROCESANDO IMÁGENES...";

        try {
            // Convertimos las fotos a texto para enviarlas
            const imgUnidad = await toBase64(fUnidad);
            const imgOdo = await toBase64(fOdo);
            const imgIne = await toBase64(fIne);

            btn.innerText = "ENVIANDO A EXCEL...";

            const payload = {
                ruta: r, unidad: u, km: k, manto: m, comentarios: c,
                fotoUnidad: imgUnidad, fotoOdo: imgOdo, fotoIne: imgIne,
                nameUnidad: fUnidad.name, nameOdo: fOdo.name, nameIne: fIne.name
            };

            await fetch(URL_WEBAPP, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(payload)
            });

            alert("✅ GUARDADO CON FOTOS");
            location.reload(); // Recarga para limpiar todo
        } catch (e) {
            alert("❌ Error: " + e);
            btn.disabled = false;
            btn.innerText = "REGISTRAR DATOS";
        }
    }
    
    // Aquí iría tu función actualizarUnidades() que ya tienes...
</script>
</body>
</html>
