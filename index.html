<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E.G.O - Sistema de Flota Pro</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { max-width: 400px; width: 100%; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        
        /* Estilo para el contenedor del logo y título */
        .header-logo { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; }
        .logo-img { max-width: 180px; height: auto; margin-bottom: 10px; }
        
        h2 { color: #1a73e8; text-align: center; margin: 0; text-transform: uppercase; border-bottom: none; }
        
        label { display: block; margin: 15px 0 5px; font-weight: bold; color: #444; }
        select, input, textarea { width: 100%; padding: 15px; margin-bottom: 10px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        select:focus, input:focus { border-color: #1a73e8; }
        .btn-principal { width: 100%; padding: 18px; background-color: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.2s; margin-top: 10px; }
        .btn-principal:disabled { background-color: #ccc; cursor: not-allowed; }
        
        .btn-modo { background-color: #fff; color: #1a73e8; border: 2px solid #1a73e8; margin-bottom: 15px; }
        .btn-modo:active { background-color: #1a73e8; color: white; }

        .btn-foto { background-color: #34a853; margin-bottom: 10px; font-size: 14px; padding: 12px; }
        .hidden { display: none !important; }
        .img-preview { width: 100%; border-radius: 8px; margin-top: 5px; margin-bottom: 10px; display: none; border: 1px solid #ddd; }
        .status { text-align: center; font-size: 14px; color: #666; margin-top: 10px; font-weight: bold; }

        #progressContainer { width: 100%; background-color: #eee; border-radius: 10px; margin-top: 15px; display: none; overflow: hidden; border: 1px solid #ddd; }
        #progressBar { width: 0%; height: 20px; background-color: #1a73e8; transition: width 0.4s ease; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-logo">
        <img src="https://res.cloudinary.com/dygb7qjgt/image/upload/v1776721918/WhatsApp_Image_2026-04-20_at_11.10.30_AM_bipr97.jpg" alt="Logo Empresa" class="logo-img">
        <h2 id="titulo">SISTEMA EGO PRO</h2>
    </div>

    <div id="sec-pass">
        <label>Contraseña de Acceso:</label>
        <input type="text" id="passInput" placeholder="Escribe aquí..." style="-webkit-text-security: disc;">
        <button class="btn-principal" onclick="verificarPass()">INGRESAR</button>
    </div>

    <div id="sec-seleccion" class="hidden">
        <label style="text-align: center; margin-bottom: 15px;">¿Qué movimiento reportará?</label>
        <button class="btn-principal btn-modo" onclick="abrirFormulario('ENTRADA')">📥 ENTRADA</button>
        <button class="btn-principal btn-modo" onclick="abrirFormulario('SALIDA')">📤 SALIDA</button>
        <button class="btn-principal btn-modo" style="border-color: #ff9800; color: #ff9800; margin-top: 5px;" onclick="window.open('https://dantesotomayor17-stack.github.io/gestion-servicios-ego/', '_blank')">📋 PROGRAMAR HOJA DE SERVICIO</button>
    </div>

    <div id="sec-form" class="hidden">
        <label>1. Seleccione la Ruta:</label>
        <select id="ruta" onchange="actualizarUnidades()">
            <option value="">-- Seleccionar --</option>
            <option value="AEROPUERTO Y GRIEGA">AEROPUERTO Y GRIEGA</option>
            <option value="ALIANZA REAL">ALIANZA REAL</option>
            <option value="CIENEGA DE FLORES">CIENEGA DE FLORES</option>
            <option value="PALMIRAS">PALMIRAS</option>
            <option value="PRO VIVIENDA">PRO VIVIENDA</option>
            <option value="RUTA 1">RUTA 1</option>
            <option value="RUTA 2">RUTA 2</option>
            <option value="RUTA 13">RUTA 13</option>
            <option value="RUTA 20">RUTA 20</option>
            <option value="RUTA 39">RUTA 39</option>
            <option value="RUTA 41">RUTA 41</option>
            <option value="RUTA 68">RUTA 68</option>
            <option value="RUTA 109">RUTA 109</option>
            <option value="RUTA 117">RUTA 117</option>
            <option value="RUTA 201">RUTA 201</option>
            <option value="RUTA 218">RUTA 218</option>
            <option value="RUTA 223">RUTA 223</option>
            <option value="RUTA 228">RUTA 228</option>
            <option value="RUTA 233">RUTA 233</option>
            <option value="RUTA 310">RUTA 310</option>
            <option value="RUTA 311">RUTA 311</option>
            <option value="RUTA 313">RUTA 313</option>
            <option value="RUTA 527">RUTA 527</option>
            <option value="RUTA 601">RUTA 601</option>
            <option value="Ruta 685/198">Ruta 685/198</option>
            <option value="VALLE SOLEADO">VALLE SOLEADO</option>
            <option value="VISTAS DEL CARMEN">VISTAS DEL CARMEN</option>
        </select>

        <label>2. Seleccione la Unidad:</label>
        <select id="unidad"><option value="">-- Elija ruta --</option></select>

        <label>3. Kilometraje Actual:</label>
        <input type="number" id="km" placeholder="Ej: 150000" inputmode="numeric">

        <label>4. Evidencias (Fotos):</label>
        
        <div id="fotos-entrada">
            <input type="file" id="fotoInput" accept="image/*" capture="camera" class="hidden" onchange="mostrarPreview(this, 'previewOdo')">
            <button class="btn-principal btn-foto" onclick="document.getElementById('fotoInput').click()">📸 FOTO ODÓMETRO</button>
            <img id="previewOdo" class="img-preview">

            <input type="file" id="fotoFrontal" accept="image/*" capture="camera" class="hidden" onchange="mostrarPreview(this, 'previewFrontal')">
            <button class="btn-principal btn-foto" onclick="document.getElementById('fotoFrontal').click()">📸 FOTO FRONTAL</button>
            <img id="previewFrontal" class="img-preview">

            <input type="file" id="fotoVin" accept="image/*" capture="camera" class="hidden" onchange="mostrarPreview(this, 'previewVin')">
            <button class="btn-principal btn-foto" onclick="document.getElementById('fotoVin').click()">📸 FOTO VIN (SERIE)</button>
            <img id="previewVin" class="img-preview">

            <input type="file" id="fotoTrasera" accept="image/*" capture="camera" class="hidden" onchange="mostrarPreview(this, 'previewTrasera')">
            <button class="btn-principal btn-foto" onclick="document.getElementById('fotoTrasera').click()">📸 PARTE TRASERA</button>
            <img id="previewTrasera" class="img-preview">

            <input type="file" id="fotoDerecha" accept="image/*" capture="camera" class="hidden" onchange="mostrarPreview(this, 'previewDerecha')">
            <button class="btn-principal btn-foto" onclick="document.getElementById('fotoDerecha').click()">📸 LATERAL DERECHO</button>
            <img id="previewDerecha" class="img-preview">

            <input type="file" id="fotoIzquierda" accept="image/*" capture="camera" class="hidden" onchange="mostrarPreview(this, 'previewIzquierda')">
            <button class="btn-principal btn-foto" onclick="document.getElementById('fotoIzquierda').click()">📸 LATERAL IZQUIERDO</button>
            <img id="previewIzquierda" class="img-preview">
        </div>

        <input type="file" id="fotoLicencia" accept="image/*" capture="camera" class="hidden" onchange="mostrarPreview(this, 'previewLicencia')">
        <button class="btn-principal btn-foto" onclick="document.getElementById('fotoLicencia').click()">📸 FOTO LICENCIA OPERADOR</button>
        <img id="previewLicencia" class="img-preview">

        <div id="div-manto">
            <label>5. Tipo de Mantenimiento:</label>
            <select id="manto">
                <option value="N/A">N/A (Solo Kilometraje)</option>
                <option value="M1">M1</option>
                <option value="M2">M2</option>
                <option value="M3">M3</option>
                <option value="M4">M4</option>
                <option value="M5">M5</option>
                <option value="M6">M6</option>
                <option value="CORRECTIVO">CORRECTIVO</option>
            </select>
        </div>

      <label>7. Comentarios / Reporte (Mecánico):</label>
        <textarea id="comentarios" style="width:100%; height:60px;" placeholder="Detalles si los hay..."></textarea>

        <label>8. Observaciones Estéticas (Recepción):</label>
        <textarea id="obsEsteticas" style="width:100%; height:60px;" placeholder="Golpes, rayones, focos rotos..."></textarea>

        <div id="progressContainer">
            <div id="progressBar"></div>
        </div>
        <div id="statusMsg" class="status"></div>

        <button id="btnRegistrar" class="btn-principal" onclick="iniciarRegistro()">REGISTRAR DATOS</button>
        <button id="btnAtras" class="btn-principal" style="background-color: #666; font-size: 14px;" onclick="location.reload()">ATRÁS</button>
    </div>
</div>
