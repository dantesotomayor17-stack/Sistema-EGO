<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E.G.O - Sistema de Flota Pro</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { max-width: 400px; width: 100%; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 20px; text-transform: uppercase; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; color: #444; }
        select, input, textarea { width: 100%; padding: 15px; margin-bottom: 10px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        select:focus, input:focus { border-color: #1a73e8; }
        .btn-principal { width: 100%; padding: 18px; background-color: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.2s; margin-top: 10px; }
        .btn-foto { background-color: #34a853; margin-bottom: 15px; }
        .hidden { display: none !important; }
        #preview { width: 100%; border-radius: 8px; margin-bottom: 10px; display: none; }
        .status { text-align: center; font-size: 14px; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>SISTEMA EGO PRO</h2>

    <div id="sec-pass">
        <label>Contraseña de Acceso:</label>
        <input type="text" id="passInput" placeholder="Escribe aquí..." style="-webkit-text-security: disc;">
        <button class="btn-principal" onclick="verificarPass()">INGRESAR</button>
    </div>

    <div id="sec-form" class="hidden">
        <label>1. Ruta:</label>
        <select id="ruta" onchange="actualizarUnidades()">
            <option value="">-- Seleccionar --</option>
            <option value="ALIANZA REAL">ALIANZA REAL</option>
            <option value="TRANSMETRO">TRANSMETRO</option>
            <option value="VISTAS DEL CARMEN">VISTAS DEL CARMEN</option>
            </select>

        <label>2. Unidad:</label>
        <select id="unidad"><option value="">-- Elija ruta --</option></select>

        <label>3. Kilometraje:</label>
        <input type="number" id="km" placeholder="Ej: 150000" inputmode="numeric">

        <label>4. Evidencia (Foto):</label>
        <input type="file" id="fotoInput" accept="image/*" capture="camera" class="hidden" onchange="mostrarPreview(this)">
        <button class="btn-principal btn-foto" onclick="document.getElementById('fotoInput').click()">📸 TOMAR FOTO ODÓMETRO</button>
        <img id="preview" src="" alt="Vista previa">

        <label>5. Mantenimiento:</label>
        <select id="manto">
            <option value="N/A">N/A (Solo Kilometraje)</option>
            <option value="M1">M1</option><option value="M2">M2</option>
        </select>

        <label>6. Comentarios:</label>
        <textarea id="comentarios" style="width:100%; height:60px;" placeholder="Detalles de la falla..."></textarea>

        <button id="btnRegistrar" class="btn-principal" onclick="iniciarRegistro()">REGISTRAR DATOS</button>
        <div id="statusMsg" class="status"></div>
    </div>
</div>

<script>
    const CLAVE_ACCESO = "EGO";
    const URL_WEBAPP = "https://script.google.com/macros/s/AKfycbyzMP1S7pHt7iokTLNTn3HcFM0MGREjX4wcKf0ukMwuhtnLnoasnwlugx3rehw8ojQ3aA/exec";
    
    // TUS DATOS DE CLOUDINARY
    const CLOUD_NAME = "dygb7qjgt";
    const UPLOAD_PRESET = "ego_fotos";

    const unidadesData = { /* Mantén aquí tu lista completa de unidades del código anterior */ };

    function verificarPass() {
        if(document.getElementById('passInput').value.toUpperCase() === CLAVE_ACCESO) {
            document.getElementById('sec-pass').style.display = 'none';
            document.getElementById('sec-form').classList.remove('hidden');
        } else { alert("Error"); }
    }

    function actualizarUnidades() {
        const r = document.getElementById('ruta').value;
        const u = document.getElementById('unidad');
        u.innerHTML = '<option value="">-- Seleccionar --</option>';
        if (r && unidadesData[r]) {
            unidadesData[r].forEach(num => {
                const opt = document.createElement('option');
                opt.value = num; opt.textContent = "Unidad " + num;
                u.appendChild(opt);
            });
        }
    }

    function mostrarPreview(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => { 
                const img = document.getElementById('preview');
                img.src = e.target.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function iniciarRegistro() {
        const fileInput = document.getElementById('fotoInput');
        const status = document.getElementById('statusMsg');
        const btn = document.getElementById('btnRegistrar');

        if(!document.getElementById('ruta').value || !document.getElementById('km').value) {
            return alert("Faltan datos obligatorios");
        }

        btn.disabled = true;
        status.innerText = "Subiendo imagen a la nube...";

        let fotoUrl = "Sin foto";

        // SI HAY FOTO, LA SUBIMOS PRIMERO A CLOUDINARY
        if(fileInput.files.length > 0) {
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('upload_preset', UPLOAD_PRESET);

            try {
                const resp = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await resp.json();
                fotoUrl = data.secure_url; // Aquí está el link mágico
            } catch (e) {
                console.error(e);
                alert("Error subiendo foto, se enviará solo el texto.");
            }
        }

        status.innerText = "Guardando en Excel...";
        enviarAGoogle(fotoUrl);
    }

    async function enviarAGoogle(fotoUrl) {
        const payload = {
            ruta: document.getElementById('ruta').value,
            unidad: document.getElementById('unidad').value,
            km: document.getElementById('km').value,
            manto: document.getElementById('manto').value,
            comentarios: document.getElementById('comentarios').value,
            foto: fotoUrl // Enviamos el link de la foto
        };

        try {
            await fetch(URL_WEBAPP, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(payload)
            });
            alert("✅ REGISTRO COMPLETO");
            location.reload();
        } catch (e) {
            alert("Error al conectar con Excel");
        }
    }
</script>
</body>
</html>
