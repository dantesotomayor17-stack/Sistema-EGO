        .container { max-width: 400px; width: 100%; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 20px; text-transform: uppercase; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; color: #444; }
        select, input, textarea { width: 100%; padding: 15px; margin-bottom: 10px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }

        .btn-principal { width: 100%; padding: 18px; background-color: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.2s; margin-top: 10px; }

        </select>

        <button id="btnRegistrar" class="btn-principal" onclick="iniciarRegistro()">REGISTRAR DATOS</button>

    function verificarPass() {
        const input = document.getElementById('passInput');
        if(input.value.toUpperCase() === CLAVE_ACCESO) {
            document.getElementById('sec-pass').style.display = 'none';
            document.getElementById('sec-form').classList.remove('hidden');
        } else {
            alert("Contraseña Incorrecta");
            input.value = "";
        }
    }

    function actualizarUnidades() {
        const r = document.getElementById('ruta').value;
        const u = document.getElementById('unidad');
        u.innerHTML = '<option value="">-- Seleccionar --</option>';
        if (r && unidadesData[r]) {
            unidadesData[r].forEach(num => {
                const opt = document.createElement('option');
                opt.value = num;
                opt.textContent = "Unidad " + num;
                u.appendChild(opt);
            });
        }
    }

    function mostrarPreview(input, imgId) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => { 
                const img = document.getElementById(imgId);
                img.src = e.target.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function subirACloudinary(file) {
        if(!file) return null;
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', UPLOAD_PRESET);
        try {
            const resp = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                method: 'POST',
                body: formData
            });
            const data = await resp.json();
            return data.secure_url || "Error en subida";
        } catch (e) {
            console.error("Error subida:", e);
            return "Error técnico";
        }
    }

    async function iniciarRegistro() {
        const status = document.getElementById('statusMsg');
        const btn = document.getElementById('btnRegistrar');

        const r = document.getElementById('ruta').value;
        const u = document.getElementById('unidad').value;
        const k = document.getElementById('km').value;

        const fOdo = document.getElementById('fotoInput').files[0];
        const fUni = document.getElementById('fotoUnidad').files[0];
        const fIne = document.getElementById('fotoIne').files[0];
        const fVin = document.getElementById('fotoVin').files[0];

        if (!r) return alert("⚠️ Error: Selecciona la RUTA.");
        if (!u) return alert("⚠️ Error: Selecciona la UNIDAD.");
        if (!k) return alert("⚠️ Error: Ingresa el KILOMETRAJE.");
        
        if (!fOdo) return alert("📸 FALTA LA FOTO DEL ODÓMETRO.");
        if (!fUni) return alert("📸 FALTA LA FOTO DE LA UNIDAD.");
        if (!fIne) return alert("📸 FALTA LA FOTO DEL INE.");
        if (!fVin) return alert("📸 FALTA LA FOTO DEL VIN (SERIE).");

        btn.disabled = true;
        btn.innerText = "SUBIENDO EVIDENCIAS...";
        
        try {
            status.innerText = "Subiendo fotos (Paso 1/4)...";
            const urlOdo = await subirACloudinary(fOdo);
            
            status.innerText = "Subiendo fotos (Paso 2/4)...";
            const urlUni = await subirACloudinary(fUni);
            
            status.innerText = "Subiendo fotos (Paso 3/4)...";
            const urlIne = await subirACloudinary(fIne);
            
            status.innerText = "Subiendo fotos (Paso 4/4)...";
            const urlVin = await subirACloudinary(fVin);

            status.innerText = "Guardando en la base de datos...";
            
            const payload = {
                ruta: r,
                unidad: u,
                km: k,
                manto: document.getElementById('manto').value,
                comentarios: document.getElementById('comentarios').value,
                fotoOdo: urlOdo,
                fotoUni: urlUni,
                fotoIne: urlIne,
                fotoVin: urlVin
            };

            await fetch(URL_WEBAPP, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(payload)
            });

            alert("✅ REGISTRO COMPLETO GUARDADO");
            location.reload();
        } catch (e) {
            alert("❌ Error al guardar datos.");
            btn.disabled = false;
            btn.innerText = "REGISTRAR DATOS";
        }
    }
